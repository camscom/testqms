---
layout: default
title: "Types of Testing"
permalink: /types-of-testing/
---

<nav class="breadcrumbs">
  <a href="/">🏠</a> &gt;
  <span class="current">Types of Testing</span>
</nav>

<br/><br/>

<h2 class="post-title" style="font-size: 40px; line-height: 34px; text-align: center;">Showing posts for:</h2>
<h2 class="post-label" style="margin-top: 50px; font-size: 37px; line-height: 30px; text-align: center; margin-bottom: 50px;">Types of Testing</h2>

<div id="related-posts-cat"></div>
<div id="pagination" class="pagination"></div>

{{ software_posts | size }}

{% assign software_posts = site.posts | where_exp: 'post', 'post.categories contains "Types of Testing"' %}

<script>
document.addEventListener("DOMContentLoaded", function () {

  const posts = [
    {% for post in software_posts %}
      {
        "title": {{ post.title | jsonify }},
        "url": "{{ post.url | relative_url }}",
        "image": "{{ post.image | relative_url }}"
      }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ];

  const resultsPerPage = 8;
  let currentPage = 1;

  function updateURL(page) {
    const newParams = new URLSearchParams(window.location.search);
    newParams.set("page", page);
    window.history.replaceState({}, "", `${window.location.pathname}?${newParams}`);
  }

  function renderPage(page) {
    const container = document.getElementById("related-posts-cat");
    const start = (page - 1) * resultsPerPage;
    const end = start + resultsPerPage;
    const paginatedResults = posts.slice(start, end);

    container.innerHTML = paginatedResults.map(post => `
      <a href="${post.url}" style="text-decoration: underline; text-align: center;">
        <img 
          class="related-img"
          src="${post.image.replace('/upload/', '/upload/f_auto,q_auto,c_fill,w_400,h_320/')}"
          srcset="
            ${post.image.replace('/upload/', '/upload/f_auto,q_auto,c_fill,w_320,h_256/')} 380w,
            ${post.image.replace('/upload/', '/upload/f_auto,q_auto,c_fill,w_400,h_320/')} 400w,
            ${post.image.replace('/upload/', '/upload/f_auto,q_auto,c_fill,w_600,h_480/')} 600w
          "
          sizes="(max-width: 780px) 400px, 380px"
          width="380px"
          alt="${post.title}"
          loading="lazy"
        />
        <div style="color: #000; font-size: 18px; font-weight: bold;">${post.title}</div>
      </a>
    `).join("");

    renderPagination();
    updateURL(page);
  }

  function renderPagination() {
    const pagination = document.getElementById("pagination");
    const totalPages = Math.ceil(posts.length / resultsPerPage);

    let html = "";
    if (currentPage > 1) {
      html += `<button class="prev-btn">⬅ Previous</button>`;
    }
    html += `<span> Page ${currentPage} of ${totalPages} </span>`;
    if (currentPage < totalPages) {
      html += `<button class="next-btn">Next ➡</button>`;
    }

    pagination.innerHTML = html;

    if (document.querySelector(".next-btn")) {
      document.querySelector(".next-btn").addEventListener("click", () => {
        currentPage++;
        renderPage(currentPage);
        setTimeout(() => {
          window.scrollTo({ top: 0, behavior: "smooth" });
        }, 50);
      });
    }
    if (document.querySelector(".prev-btn")) {
      document.querySelector(".prev-btn").addEventListener("click", () => {
        currentPage--;
        renderPage(currentPage);
        setTimeout(() => {
          window.scrollTo({ top: 0, behavior: "smooth" });
        }, 50);
      });
    }
  }

  const params = new URLSearchParams(window.location.search);
  currentPage = parseInt(params.get("page")) || 1;
  renderPage(currentPage);

});
</script>
